schema_version = 1

name        = "Ollama Base Chat"
description = "Ollama native /api/chat request body. Abstract — extend it and set model/options."
abstract    = true
extends     = "Chat Base"

provider_instance = "Ollama (Native)"
endpoint          = "/api/chat"
tags = ["ollama", "local"]

[body]
stream   = true
messages = """
[ {% include "partials/ollama_messages.jinja" %} ]
"""

[body.options]
num_predict = 2048
temperature = 0.7
keep_alive  = "5m"
